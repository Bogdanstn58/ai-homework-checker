name: Grade assignment

on:
  push:
    branches: [ "solution", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  grade:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            version: '3.11'
            test_cmd: |
              pip install -r requirements.txt
              pytest tests/ -v
            ai_script: python scripts/ai_review.py solution.py
            artifact_name: ai_report_python.txt
          - language: cpp
            version: '12'
            test_cmd: |
              mkdir -p build && cd build
              cmake .. -DCMAKE_CXX_COMPILER=g++-12
              make
              ctest --output-on-failure
            ai_script: python scripts/ai_review_cpp.py solution.cpp
            artifact_name: ai_report_cpp.txt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Установка Python (если язык python) ---
      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      # --- Установка C++ (если язык cpp) ---
      - name: Setup C++
        if: matrix.language == 'cpp'
        uses: aminya/setup-cpp@v1
        with:
          compiler: gcc-${{ matrix.version }}
          cmake: true
          vcpkg: false

      # --- Отладка: список файлов ---
      - name: List files
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          echo "=== Check solution file ==="
          if [ "${{ matrix.language }}" = "python" ]; then
            ls -la solution.py || echo "solution.py NOT FOUND"
          else
            ls -la solution.cpp || echo "solution.cpp NOT FOUND"
          fi

      # --- Запуск тестов и сборки ---
      - name: Run tests
        run: ${{ matrix.test_cmd }}

      # --- Запуск ИИ-ревью ---
      - name: Run AI Reviewer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          ${{ matrix.ai_script }} > ${{ matrix.artifact_name }}
          echo "AI review saved to ${{ matrix.artifact_name }}"

      # --- Сохранение отчёта как артефакта ---
      - name: Upload AI report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
