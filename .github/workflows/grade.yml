name: Grade assignment

on:
  push:
    branches: [ "solution" ]  # Студент пушит изменения в свою ветку решения

jobs:
  setup-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - language: python
            version: '3.11'
            build_cmd: |
              pip install -r requirements.txt
              pytest tests.py -v
          - language: cpp
            version: '12'
            # `aminya/setup-cpp` — это готовое решение, которое устанавливает компилятор, CMake и другие нужные инструменты
            setup_action: aminya/setup-cpp@v1
            build_cmd: |
              mkdir build && cd build
              cmake .. -DCMAKE_CXX_COMPILER=g++-12
              make
              ctest --output-on-failure
    steps:
      # 1. Общий шаг для загрузки кода
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Условный шаг для установки компилятора C++
      - name: Setup C++
        if: matrix.language == 'cpp'
        uses: ${{ matrix.setup_action }}
        with:
          compiler: gcc-${{ matrix.version }}
          cmake: true

      # 3. Условный шаг для установки Python
      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      # 4. Выполнение специфичной для языка команды сборки/тестирования
      - name: Run build and tests
        run: ${{ matrix.build_cmd }}

      # 5. Запуск ИИ для C++ (пример интеграции)
      - name: Run AI Reviewer for C++
        if: matrix.language == 'cpp'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python scripts/ai_review_cpp.py solution.cpp > ai_report_${{ matrix.language }}.txt
