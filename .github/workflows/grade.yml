name: Grade assignment

on:
  push:
    branches: [ "solution", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  grade:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Python ---
          - language: python
            version: '3.11'
            setup_action: actions/setup-python@v5
            build_cmd: ''
            test_cmd: |
              pip install -r requirements.txt
              pytest tests/ -v
            ai_script: python scripts/ai_review.py solution.py
            artifact_name: ai_report_python.txt

          # --- C++ ---
          - language: cpp
            version: '12'
            setup_action: aminya/setup-cpp@v1
            build_cmd: |
              cmake -B build -DCMAKE_CXX_COMPILER=g++-12
              cmake --build build
            test_cmd: |
              cd build
              ctest --output-on-failure
            ai_script: python scripts/ai_review_cpp.py solution.cpp
            artifact_name: ai_report_cpp.txt

    steps:
      # 1. Загрузка кода
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Установка Python (если язык python)
      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      # 3. Установка C++ компилятора и CMake (если язык cpp)
      - name: Setup C++
        if: matrix.language == 'cpp'
        uses: aminya/setup-cpp@v1
        with:
          compiler: gcc-${{ matrix.version }}
          cmake: true
          ninja: false
          vcpkg: false

      # 4. Отладка: список файлов
      - name: List files for debugging
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          if [ "${{ matrix.language }}" = "python" ]; then
            echo "solution.py exists: $(test -f solution.py && echo yes || echo no)"
          else
            echo "solution.cpp exists: $(test -f solution.cpp && echo yes || echo no)"
            echo "CMakeLists.txt exists: $(test -f CMakeLists.txt && echo yes || echo no)"
          fi

      # 5. Сборка (только для C++)
      - name: Build
        if: matrix.language == 'cpp'
        run: ${{ matrix.build_cmd }}

      # 6. Запуск тестов (продолжаем даже при падении)
      - name: Run tests
        run: ${{ matrix.test_cmd }}
        continue-on-error: true

      # 7. Запуск ИИ-ревью с отправкой в Google Sheets
      - name: Run AI Reviewer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ${{ matrix.ai_script }} > ${{ matrix.artifact_name }}
          echo "AI review saved to ${{ matrix.artifact_name }}"

      # 8. Сохранение отчёта как артефакта (для преподавателя)
      - name: Upload AI report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
