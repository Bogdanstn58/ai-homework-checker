name: AI Homework Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [ main ]

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Debug: list files in root
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          echo "=== Check solution.py ==="
          if [ -f solution.py ]; then
            echo "solution.py exists, first 3 lines:"
            head -3 solution.py
          else
            echo "ERROR: solution.py NOT FOUND"
            exit 1
          fi
          
      - name: Run local tests (pytest)
        run: pytest tests/ -v
        
      - name: Run AI Reviewer
        run: python scripts/ai_review.py solution.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
