name: Publish Results

on:
  workflow_dispatch:  # Этот workflow запускается вручную

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: grading  # Ссылаемся на защищённое окружение
    steps:
      # 1. Загружаем артефакт с результатами проверки, созданный в прошлом пайплайне
      - name: Download AI report
        uses: actions/download-artifact@v4
        with:
          name: ai-grading-report

      # 2. Отправляем комментарий к Pull Request студента
      - name: Post comment to PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          REPORT=$(cat ai_report.txt)
          gh pr comment $PR_NUMBER --body "$REPORT"
